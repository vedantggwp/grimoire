name: Bug Report
description: Report reproducible Grimoire behavior that is not working
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Include the command or stage, a minimal workspace shape, and any relevant fixture details.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "20.x"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS, Linux, Windows"
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I have not included secrets, private source material, or proprietary workspace contents.
          required: true
